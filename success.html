<!DOCTYPE html>
<html lang="it" data-lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EleviAI – Acquisto completato!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 62 40'><defs><linearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'><stop offset='0%25' stop-color='%237c5cff'/><stop offset='100%25' stop-color='%2331d0aa'/></linearGradient></defs><line x1='4' y1='36' x2='20' y2='4' stroke='url(%23g)' stroke-width='2' stroke-linecap='round'/><line x1='20' y1='4' x2='36' y2='36' stroke='url(%23g)' stroke-width='2' stroke-linecap='round'/><line x1='20' y1='4' x2='20' y2='37' stroke='url(%23g)' stroke-width='2.5' stroke-linecap='round'/><line x1='8' y1='24' x2='54' y2='24' stroke='url(%23g)' stroke-width='1.5' stroke-linecap='round'/><line x1='36' y1='5' x2='54' y2='24' stroke='url(%23g)' stroke-width='2' stroke-linecap='round'/><line x1='54' y1='4' x2='54' y2='37' stroke='url(%23g)' stroke-width='2.5' stroke-linecap='round'/></svg>" />
  <link rel="stylesheet" href="styles.css">
  <script src="lang-switch.js"></script>
  <style>
    .success-card {
      background: #141823;
      border: 1px solid #2a3145;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 520px;
      margin: 80px auto;
      text-align: center;
    }
    .checkmark {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }
    p.sub {
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header class="container header">
    <a class="logo" href="index.html">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 62 40" fill="none" aria-hidden="true" style="width:44px;height:28px;">
        <defs>
          <linearGradient id="pg" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7c5cff"/>
            <stop offset="100%" stop-color="#31d0aa"/>
          </linearGradient>
        </defs>
        <line x1="4" y1="36" x2="20" y2="4" stroke="url(#pg)" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="4" x2="36" y2="36" stroke="url(#pg)" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="4" x2="20" y2="37" stroke="url(#pg)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="8" y1="24" x2="54" y2="24" stroke="url(#pg)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="36" y1="5" x2="54" y2="24" stroke="url(#pg)" stroke-width="2" stroke-linecap="round"/>
        <line x1="54" y1="4" x2="54" y2="37" stroke="url(#pg)" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span>EleviAI</span>
    </a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="it" type="button">IT</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>
  </header>

  <div class="container">
    <div class="success-card">
      <div class="checkmark">🎉</div>
      <h1>
        <span class="lang-it">Acquisto completato!</span>
        <span class="lang-en">Purchase complete!</span>
      </h1>
      <p class="sub">
        <span class="lang-it">
          I tuoi seminari sono pronti. Inizia subito a generare il tuo prossimo corso.
        </span>
        <span class="lang-en">
          Your seminars are ready. Start generating your next lecture right away.
        </span>
      </p>
      <a href="prova.html" class="btn" style="display:inline-block; text-decoration:none;">
        <span class="lang-it">Genera un corso →</span>
        <span class="lang-en">Generate a lecture →</span>
      </a>
    </div>
  </div>

</body>
</html>
