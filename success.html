<!DOCTYPE html>
<html lang="it" data-lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNL – Acquisto completato!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 40'><text y='36' font-family='serif' font-weight='900' font-size='38' fill='%234d8ed4'>P</text><text x='28' y='36' font-family='serif' font-weight='900' font-size='38' fill='%23c9a94c'>NL</text></svg>" />
  <link rel="stylesheet" href="styles.css">
  <script src="lang-switch.js"></script>
  <style>
    .success-card {
      background: #141823;
      border: 1px solid #2a3145;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 520px;
      margin: 80px auto;
      text-align: center;
    }
    .checkmark {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }
    p.sub {
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header class="container header">
    <a class="logo" href="index.html">
      <span class="logo-p">P</span><span class="logo-nl">NL</span>
    </a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="it" type="button">IT</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>
  </header>

  <div class="container">
    <div class="success-card">
      <div class="checkmark">🎉</div>
      <h1>
        <span class="lang-it">Acquisto completato!</span>
        <span class="lang-en">Purchase complete!</span>
      </h1>
      <p class="sub">
        <span class="lang-it">
          I tuoi seminari sono pronti. Inizia subito a generare il tuo prossimo corso.
        </span>
        <span class="lang-en">
          Your seminars are ready. Start generating your next lecture right away.
        </span>
      </p>
      <a href="prova.html" class="btn" style="display:inline-block; text-decoration:none;">
        <span class="lang-it">Genera un corso →</span>
        <span class="lang-en">Generate a lecture →</span>
      </a>
    </div>
  </div>

</body>
</html>
