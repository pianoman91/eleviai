<!DOCTYPE html>
<html lang="it" data-lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PNL – Capitolo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 40'><text y='36' font-family='serif' font-weight='900' font-size='38' fill='%234d8ed4'>P</text><text x='28' y='36' font-family='serif' font-weight='900' font-size='38' fill='%23c9a94c'>NL</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <script src="lang-switch.js"></script>
  <style>
    .box { background:#141823; padding:20px; border-radius:12px; }
    .toolbar {
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
      margin: 14px 0 6px;
      padding: 10px;
      border: 1px solid #2a3145;
      border-radius: 12px;
      background: #0c1020;
    }
    .toolbar label { font-size: 12px; opacity: 0.9; }
    .toolbar select, .toolbar input[type="range"] {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #2a3145;
      background:#0c1020;
      color:white;
    }
    .chapter-title { font-size: 26px; font-weight: 800; margin-bottom: 14px; }
    .chapter-subtitle { font-size: 18px; font-weight: 700; margin-top: 18px; margin-bottom: 8px; }
    .muted { color: var(--muted); }

    @media print {
      .no-print { display: none !important; }
      body { background: white !important; color: black !important; }
      .box { background: white !important; border: none !important; padding: 0 !important; }
      a { color: black !important; text-decoration: none !important; }
    }
  </style>
</head>
<body>

  <header class="container header no-print">
    <a class="logo" href="prova.html">
      <span class="logo-p">P</span><span class="logo-nl">NL</span>
    </a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="it" type="button">IT</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>
  </header>

  <div class="container" style="padding:40px 0;">
    <h1 id="page-title">
      <span class="lang-it">Capitolo</span>
      <span class="lang-en">Chapter</span>
    </h1>
    <p id="chapter-info" class="muted"></p>

    <!-- TOOLBAR TTS + PDF -->
    <div class="toolbar no-print">
      <button class="btn small" id="tts-play">
        <span class="lang-it">Ascolta</span>
        <span class="lang-en">Listen</span>
      </button>
      <button class="btn small ghost" id="tts-pause">
        <span class="lang-it">Pausa</span>
        <span class="lang-en">Pause</span>
      </button>
      <button class="btn small ghost" id="tts-stop">Stop</button>

      <label>
        <span class="lang-it">Velocità</span>
        <span class="lang-en">Speed</span>
        <input id="tts-rate" type="range" min="0.7" max="1.3" step="0.05" value="1" />
        <span id="tts-rate-label">1.00x</span>
      </label>

      <label>
        <span class="lang-it">Voce</span>
        <span class="lang-en">Voice</span>
        <select id="tts-voice"></select>
      </label>

      <button class="btn small" id="pdf">
        <span class="lang-it">Scarica PDF</span>
        <span class="lang-en">Download PDF</span>
      </button>
    </div>

    <div id="chapter-content" class="box" style="margin-top:16px;"></div>

    <div class="no-print" style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn ghost" id="prev-chapter" style="display:none;">
        <span class="lang-it">Capitolo precedente</span>
        <span class="lang-en">Previous chapter</span>
      </button>
      <button class="btn" id="next-chapter" style="display:none;">
        <span class="lang-it">Capitolo successivo</span>
        <span class="lang-en">Next chapter</span>
      </button>
      <button class="btn" id="go-quiz" style="display:none;">
        <span class="lang-it">Vai al quiz</span>
        <span class="lang-en">Go to quiz</span>
      </button>
      <a href="prova.html" class="btn ghost">
        <span class="lang-it">Torna alla prova gratuita</span>
        <span class="lang-en">Back to free trial</span>
      </a>
    </div>
  </div>

  <script>
    (function () {
      const outline = localStorage.getItem("eleviai_outline");
      const keywords = localStorage.getItem("eleviai_keywords");
      const language = localStorage.getItem("eleviai_language") || "Italiano";
      let currentChapter = parseInt(localStorage.getItem("eleviai_current_chapter") || "1", 10);
      const authToken = sessionStorage.getItem("eleviai_token") || "";

      const pageTitleEl = document.getElementById("page-title");
      const infoEl = document.getElementById("chapter-info");
      const contentEl = document.getElementById("chapter-content");

      const prevBtn = document.getElementById("prev-chapter");
      const nextBtn = document.getElementById("next-chapter");
      const quizBtn = document.getElementById("go-quiz");

      const btnPlay = document.getElementById("tts-play");
      const btnPause = document.getElementById("tts-pause");
      const btnStop = document.getElementById("tts-stop");
      const rateEl = document.getElementById("tts-rate");
      const rateLabel = document.getElementById("tts-rate-label");
      const voiceSelect = document.getElementById("tts-voice");
      const pdfBtn = document.getElementById("pdf");

      function getLang() {
        return document.documentElement.getAttribute("data-lang") || "it";
      }

      if (!outline || !keywords) {
        contentEl.textContent = getLang() === "en"
          ? "No course found. Generate an outline from the free trial page first."
          : "Nessun corso trovato. Genera prima un indice dalla pagina di prova gratuita.";
        disableTTS();
        return;
      }

      const lines = outline.split("\n");
      const chapterLines = lines.filter((l) => /^\s*\d+[\.\)]/.test(l));
      const totalChapters = chapterLines.length || 1;

      if (currentChapter < 1) currentChapter = 1;
      if (currentChapter > totalChapters) currentChapter = totalChapters;
      localStorage.setItem("eleviai_current_chapter", String(currentChapter));

      const currentLine = (chapterLines[currentChapter - 1] || `Capitolo ${currentChapter}`).trim();

      // Update page title (preserve lang spans, set number)
      pageTitleEl.innerHTML =
        `<span class="lang-it">Capitolo ${currentChapter}</span>` +
        `<span class="lang-en">Chapter ${currentChapter}</span>`;

      const langLabel = getLang() === "en" ? "Chapter" : "Capitolo";
      infoEl.textContent =
        `${langLabel} ${currentChapter}/${totalChapters} — ${currentLine} — ${language}`;

      if (currentChapter > 1) prevBtn.style.display = "inline-block";
      if (currentChapter < totalChapters) nextBtn.style.display = "inline-block";
      else quizBtn.style.display = "inline-block";

      function escapeHtml(s) {
        return s
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderChapter(text) {
        const rawLines = text.split("\n").map(l => l.trim()).filter(Boolean);
        let html = "";
        rawLines.forEach((line, idx) => {
          const safe = escapeHtml(line);
          if (idx === 0 && line.toUpperCase().startsWith("CAPITOLO")) {
            html += `<div class="chapter-title">${safe}</div>`;
            return;
          }
          if (line.length <= 70 && !line.endsWith(".") && !line.endsWith(":")) {
            html += `<div class="chapter-subtitle">${safe}</div>`;
            return;
          }
          html += `<p>${safe}</p>`;
        });
        return html || (getLang() === "en" ? "<p>No content.</p>" : "<p>Nessun contenuto.</p>");
      }

      contentEl.textContent = getLang() === "en"
        ? "Generating chapter... ⏳"
        : "Generazione del capitolo in corso... ⏳";

      fetch("/api/generateChapter", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + authToken
        },
        body: JSON.stringify({ keywords, language, outline, chapterNumber: currentChapter })
      })
        .then((r) => r.json())
        .then((data) => {
          if (!data || !data.chapterContent) {
            contentEl.textContent = getLang() === "en"
              ? "Error: no chapter content received from AI."
              : "Errore: nessun contenuto del capitolo ricevuto dall'AI.";
            disableTTS();
            return;
          }
          localStorage.setItem(`eleviai_chapter_${currentChapter}_text`, data.chapterContent);
          contentEl.innerHTML = renderChapter(data.chapterContent);
          setupTTS();
        })
        .catch((err) => {
          contentEl.textContent = getLang() === "en"
            ? "Network error while generating the chapter."
            : "Errore di rete durante la generazione del capitolo.";
          console.error("Network error (chapter):", err);
          disableTTS();
        });

      prevBtn.addEventListener("click", () => {
        stopSpeaking();
        if (currentChapter > 1) {
          localStorage.setItem("eleviai_current_chapter", String(currentChapter - 1));
          window.location.reload();
        }
      });
      nextBtn.addEventListener("click", () => {
        stopSpeaking();
        if (currentChapter < totalChapters) {
          localStorage.setItem("eleviai_current_chapter", String(currentChapter + 1));
          window.location.reload();
        }
      });
      quizBtn.addEventListener("click", () => {
        stopSpeaking();
        window.location.href = "quiz.html";
      });

      pdfBtn.addEventListener("click", () => {
        stopSpeaking();
        document.title = `PNL - Capitolo ${currentChapter}`;
        window.print();
      });

      let utter = null;

      function disableTTS() {
        btnPlay.disabled = true;
        btnPause.disabled = true;
        btnStop.disabled = true;
        rateEl.disabled = true;
        voiceSelect.disabled = true;
      }

      function stopSpeaking() {
        try {
          if ("speechSynthesis" in window) window.speechSynthesis.cancel();
        } catch {}
      }

      function getReadableTextFromDOM() {
        const parts = [];
        contentEl.querySelectorAll(".chapter-title, .chapter-subtitle, p").forEach(n => {
          const t = (n.textContent || "").trim();
          if (t) parts.push(t);
        });
        return parts.join("\n\n");
      }

      function setupTTS() {
        if (!("speechSynthesis" in window)) { disableTTS(); return; }

        rateLabel.textContent = Number(rateEl.value).toFixed(2) + "x";

        function populateVoices() {
          const voices = window.speechSynthesis.getVoices() || [];
          voiceSelect.innerHTML = "";
          voices.forEach((v, idx) => {
            const opt = document.createElement("option");
            opt.value = String(idx);
            opt.textContent = `${v.name} (${v.lang})`;
            voiceSelect.appendChild(opt);
          });
        }
        populateVoices();
        window.speechSynthesis.onvoiceschanged = populateVoices;

        rateEl.addEventListener("input", () => {
          rateLabel.textContent = Number(rateEl.value).toFixed(2) + "x";
        });

        btnPlay.addEventListener("click", () => {
          stopSpeaking();
          const text = getReadableTextFromDOM();
          if (!text) return;
          utter = new SpeechSynthesisUtterance(text);
          utter.rate = Number(rateEl.value);
          const voices = window.speechSynthesis.getVoices() || [];
          const voiceIdx = parseInt(voiceSelect.value || "0", 10);
          if (voices[voiceIdx]) utter.voice = voices[voiceIdx];
          window.speechSynthesis.speak(utter);
        });

        btnPause.addEventListener("click", () => {
          if (!("speechSynthesis" in window)) return;
          if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
            window.speechSynthesis.pause();
          } else if (window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
          }
        });

        btnStop.addEventListener("click", () => stopSpeaking());
      }
    })();
  </script>
</body>
</html>
