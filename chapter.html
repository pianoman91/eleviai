<!DOCTYPE html>
<html lang="it" data-lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PNL – Capitolo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 40'><text y='36' font-family='serif' font-weight='900' font-size='38' fill='%234d8ed4'>P</text><text x='28' y='36' font-family='serif' font-weight='900' font-size='38' fill='%23c9a94c'>NL</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <script src="lang-switch.js"></script>
  <style>
    /* ---- Layout ---- */
    .chapter-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 28px;
      align-items: start;
      padding: 32px 0 48px;
    }

    /* ---- Sidebar ---- */
    .chapter-sidebar {
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 0;
      scrollbar-width: thin;
    }
    .sidebar-heading {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--brand);
      padding: 0 14px 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .sidebar-chapter {
      display: block;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      border-radius: 0;
      line-height: 1.4;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background .12s;
    }
    .sidebar-chapter:hover { background: var(--input-bg); }
    .sidebar-chapter.active {
      font-weight: 800;
      color: var(--brand);
      background: var(--input-bg);
      border-left: 3px solid var(--brand);
      padding-left: 11px;
    }
    /* Sub-chapter entries (1.1, 2.3, etc.) */
    .sidebar-chapter.sub {
      padding-left: 22px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }
    .sidebar-chapter.sub:hover { background: var(--input-bg); }
    .sidebar-chapter.sub.active {
      font-weight: 700;
      color: var(--brand);
      padding-left: 19px;
    }
    .sidebar-sub {
      padding: 3px 14px 3px 22px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ---- Main content ---- */
    .chapter-main { min-width: 0; }
    .box { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 12px; }
    .chapter-title { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
    .chapter-subtitle { font-size: 17px; font-weight: 700; margin-top: 18px; margin-bottom: 6px; }
    .muted { color: var(--muted); }

    /* ---- Responsive ---- */
    @media (max-width: 720px) {
      .chapter-layout { grid-template-columns: 1fr; }
      .chapter-sidebar {
        position: static;
        max-height: 180px;
        order: -1;
      }
    }

    @media print {
      .no-print { display: none !important; }
      .chapter-layout { display: block; }
      .chapter-sidebar { display: none; }
      .box { border: none !important; padding: 0 !important; }
      body { color: #000 !important; background: #fff !important; }
    }
  </style>
</head>
<body>

  <header class="container header no-print">
    <a class="logo" href="prova.html">
      <span class="logo-p">P</span><span class="logo-nl">NL</span>
    </a>
    <div style="display:flex; align-items:center; gap:16px;">
      <a href="#contact-footer" style="font-size:13px; color:var(--muted); text-decoration:none; opacity:.8;">
        <span class="lang-it">Contatti</span>
        <span class="lang-en">Contact</span>
      </a>
      <button onclick="sessionStorage.removeItem('eleviai_token'); window.location.href='auth.html';" style="font-size:12px; color:var(--muted); background:none; border:1px solid var(--border); border-radius:8px; padding:5px 10px; cursor:pointer;">
        <span class="lang-it">Esci</span>
        <span class="lang-en">Logout</span>
      </button>
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="it" type="button">IT</button>
        <button class="lang-btn" data-lang="en" type="button">EN</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="chapter-layout">

      <!-- Sidebar index -->
      <aside class="chapter-sidebar no-print" id="sidebar"></aside>

      <!-- Main reading area -->
      <div class="chapter-main">
        <h1 id="page-title">
          <span class="lang-it">Capitolo</span>
          <span class="lang-en">Chapter</span>
        </h1>
        <p id="chapter-info" class="muted" style="margin-bottom:14px;"></p>

        <div class="no-print" style="margin-bottom:14px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn small" id="pdf">
            <span class="lang-it">Scarica PDF capitolo</span>
            <span class="lang-en">Download chapter PDF</span>
          </button>
          <button class="btn small ghost" id="pdf-full">
            <span class="lang-it">Scarica Masterclass completa PDF</span>
            <span class="lang-en">Download full Masterclass PDF</span>
          </button>
        </div>

        <div id="chapter-content" class="box"></div>

        <div class="no-print" style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn ghost" id="prev-chapter" style="display:none;">
            <span class="lang-it">← Capitolo precedente</span>
            <span class="lang-en">← Previous</span>
          </button>
          <button class="btn" id="next-chapter" style="display:none;">
            <span class="lang-it">Capitolo successivo →</span>
            <span class="lang-en">Next →</span>
          </button>
          <button class="btn" id="go-quiz">
            <span class="lang-it">Vai al quiz</span>
            <span class="lang-en">Go to quiz</span>
          </button>
          <a href="prova.html" class="btn ghost">
            <span class="lang-it">Nuova Masterclass</span>
            <span class="lang-en">New Masterclass</span>
          </a>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function () {
      const outline   = localStorage.getItem("eleviai_outline")   || "";
      const keywords  = localStorage.getItem("eleviai_keywords")  || "";
      const language  = localStorage.getItem("eleviai_language")  || "Italiano";
      const authToken = sessionStorage.getItem("eleviai_token")   || "";

      let currentChapter = parseInt(localStorage.getItem("eleviai_current_chapter") || "1", 10);

      const pageTitleEl = document.getElementById("page-title");
      const infoEl      = document.getElementById("chapter-info");
      const contentEl   = document.getElementById("chapter-content");
      const sidebarEl   = document.getElementById("sidebar");
      const prevBtn     = document.getElementById("prev-chapter");
      const nextBtn     = document.getElementById("next-chapter");
      const quizBtn     = document.getElementById("go-quiz");
      const pdfBtn      = document.getElementById("pdf");

      function getLang() {
        return document.documentElement.getAttribute("data-lang") || "it";
      }
      function escapeHtml(s) {
        return (s || "")
          .replaceAll("&","&amp;").replaceAll("<","&lt;")
          .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
      }

      if (!outline || !keywords) {
        contentEl.innerHTML =
          `<p><span class="lang-it">Nessuna Masterclass trovata. Genera prima un indice dalla pagina di prova gratuita.</span>` +
          `<span class="lang-en">No Masterclass found. Generate an outline from the free trial page first.</span></p>`;
        return;
      }

      // Match top-level chapters ("1. Title", "2) Title") and sub-chapters ("1.1 Title", "2.3 Title")
      const TOP_CHAPTER_RE = /^\s*\d+[.)]\s/;
      const ALL_CHAPTER_RE = /^\s*(?:\d+[.)]\s|\d+\.\d+[\s.])/;

      const allLines     = outline.split("\n").map(l => l.trimEnd()).filter(l => l.trim());
      const chapterLines = allLines.filter(l => ALL_CHAPTER_RE.test(l));
      const totalChapters = chapterLines.length || 1;

      if (currentChapter < 1) currentChapter = 1;
      if (currentChapter > totalChapters) currentChapter = totalChapters;
      localStorage.setItem("eleviai_current_chapter", String(currentChapter));

      const currentLine = (chapterLines[currentChapter - 1] || "").trim();

      // Parse the chapter number code (e.g. "1.2") and title text from the line
      const lineNumMatch = currentLine.match(/^(\d+(?:\.\d+)*)[.) ]+(.+)/);
      const chNum   = lineNumMatch ? lineNumMatch[1] : String(currentChapter);
      const chTitle = lineNumMatch ? lineNumMatch[2].trim() : currentLine;

      // ---- Page title: "Chapter 1.2 – Historical Context and Movements" ----
      pageTitleEl.innerHTML =
        `<span class="lang-it">Capitolo ${escapeHtml(chNum)} – ${escapeHtml(chTitle)}</span>` +
        `<span class="lang-en">Chapter ${escapeHtml(chNum)} – ${escapeHtml(chTitle)}</span>`;

      infoEl.textContent = `${currentChapter} / ${totalChapters}`;

      // ---- Navigation buttons ----
      if (currentChapter > 1) prevBtn.style.display = "inline-block";
      if (currentChapter < totalChapters) nextBtn.style.display = "inline-block";

      // ---- Build sidebar ----
      function buildSidebar() {
        const isEn = getLang() === "en";
        let html = `<div class="sidebar-heading">${isEn ? "Index" : "Indice"}</div>`;
        let chapterIdx = 0;

        allLines.forEach(line => {
          if (ALL_CHAPTER_RE.test(line)) {
            chapterIdx++;
            const isActive = chapterIdx === currentChapter;
            const isSub = !TOP_CHAPTER_RE.test(line);
            html += `<button class="sidebar-chapter${isSub ? " sub" : ""}${isActive ? " active" : ""}" data-ch="${chapterIdx}">${escapeHtml(line.trim())}</button>`;
          } else {
            html += `<div class="sidebar-sub">${escapeHtml(line.trim())}</div>`;
          }
        });

        sidebarEl.innerHTML = html;

        // Navigate on click
        sidebarEl.querySelectorAll(".sidebar-chapter").forEach(btn => {
          btn.addEventListener("click", () => {
            const ch = parseInt(btn.dataset.ch, 10);
            if (ch !== currentChapter) {
              localStorage.setItem("eleviai_current_chapter", String(ch));
              window.location.reload();
            }
          });
        });

        // Scroll active item into view
        const activeBtn = sidebarEl.querySelector(".sidebar-chapter.active");
        if (activeBtn) activeBtn.scrollIntoView({ block: "center" });
      }
      buildSidebar();

      // ---- Render chapter content ----
      // Match heading words with or without a digit (AI sometimes omits it for sub-chapters)
      const CHAPTER_HEADING_RE = /^(CHAPTER|CAPITOLO|CHAPITRE|CAP[IÍ]TULO|KAPITEL)\b/i;

      function disclaimerHTML() {
        if (currentChapter !== 1) return "";
        return `<p style="font-size:13px; color:var(--muted); line-height:1.6; font-style:italic; border-bottom:1px solid var(--border); padding-bottom:16px; margin-bottom:16px;">` +
          `<span class="lang-it">Questa Masterclass è stata generata dall'intelligenza artificiale. Pur adoperandosi per garantire l'accuratezza, i contenuti dovrebbero essere verificati in modo indipendente prima di essere applicati in qualsiasi contesto.</span>` +
          `<span class="lang-en">This Masterclass was generated by artificial intelligence. While every effort has been made to ensure accuracy, content should be independently verified before being applied in any contexts.</span>` +
          `</p>`;
      }

      function renderChapter(text) {
        const rawLines = text.split("\n").map(l => l.trim()).filter(Boolean);
        let html = "";
        rawLines.forEach((line, idx) => {
          // Skip the first line if it's just the chapter heading word — title is in the page header
          if (idx === 0 && CHAPTER_HEADING_RE.test(line)) return;
          const safe = escapeHtml(line);
          if (line.length <= 70 && !line.endsWith(".") && !line.endsWith(":")) {
            html += `<div class="chapter-subtitle">${safe}</div>`;
            return;
          }
          html += `<p>${safe}</p>`;
        });
        return html || `<p>${getLang() === "en" ? "No content." : "Nessun contenuto."}</p>`;
      }

      // ---- Load chapter: use cache if available, otherwise fetch from AI ----
      const cacheKey = `eleviai_chapter_${currentChapter}_text`;
      const cached = localStorage.getItem(cacheKey);

      if (cached) {
        contentEl.innerHTML = disclaimerHTML() + renderChapter(cached);
      } else {
        contentEl.innerHTML =
          `<p><span class="lang-it">Generazione del capitolo in corso… ⏳</span>` +
          `<span class="lang-en">Generating chapter… ⏳</span></p>`;

        fetch("/api/generateChapter", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + authToken },
          body: JSON.stringify({ keywords, language, outline, chapterNumber: currentChapter, chapterTitle: currentLine })
        })
          .then(r => r.json())
          .then(data => {
            if (!data || !data.chapterContent) {
              contentEl.innerHTML =
                `<p><span class="lang-it">Errore: nessun contenuto ricevuto dall'AI.</span>` +
                `<span class="lang-en">Error: no chapter content received from AI.</span></p>`;
              return;
            }
            localStorage.setItem(cacheKey, data.chapterContent);
            contentEl.innerHTML = disclaimerHTML() + renderChapter(data.chapterContent);
          })
          .catch(err => {
            contentEl.innerHTML =
              `<p><span class="lang-it">Errore di rete durante la generazione del capitolo.</span>` +
              `<span class="lang-en">Network error while generating the chapter.</span></p>`;
            console.error("Network error (chapter):", err);
          });
      }

      // ---- Button handlers ----
      prevBtn.addEventListener("click", () => {
        localStorage.setItem("eleviai_current_chapter", String(currentChapter - 1));
        window.location.reload();
      });
      nextBtn.addEventListener("click", () => {
        localStorage.setItem("eleviai_current_chapter", String(currentChapter + 1));
        window.location.reload();
      });
      quizBtn.addEventListener("click", () => {
        window.location.href = "quiz.html";
      });
      pdfBtn.addEventListener("click", () => {
        const orig = document.title;
        document.title = `PNL – Chapter ${currentChapter}`;
        window.print();
        document.title = orig;
      });

      document.getElementById("pdf-full")?.addEventListener("click", async () => {
        const btn = document.getElementById("pdf-full");
        const lang = getLang();
        const courseTitle = (chapterLines[0] || keywords).replace(/^\d+[.)]\s*/, "");

        // Fetch all missing chapters first
        const missing = chapterLines.filter((_, idx) =>
          !localStorage.getItem(`eleviai_chapter_${idx + 1}_text`)
        );

        if (missing.length > 0) {
          btn.disabled = true;
          btn.innerHTML = lang === "en"
            ? `Generating ${missing.length} missing chapter(s)… 0/${missing.length}`
            : `Genero ${missing.length} capitolo/i mancante/i… 0/${missing.length}`;

          let done = 0;
          for (let idx = 0; idx < chapterLines.length; idx++) {
            const cacheKey = `eleviai_chapter_${idx + 1}_text`;
            if (localStorage.getItem(cacheKey)) continue;
            const line = chapterLines[idx];
            try {
              const r = await fetch("/api/generateChapter", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + authToken },
                body: JSON.stringify({ keywords, language, outline, chapterNumber: idx + 1, chapterTitle: line })
              });
              const data = await r.json();
              if (data?.chapterContent) localStorage.setItem(cacheKey, data.chapterContent);
            } catch (e) { console.error("Chapter fetch error:", e); }
            done++;
            btn.innerHTML = lang === "en"
              ? `Generating… ${done}/${missing.length}`
              : `Genero… ${done}/${missing.length}`;
          }

          btn.disabled = false;
          btn.innerHTML = lang === "en"
            ? "Download full Masterclass PDF"
            : "Scarica Masterclass completa PDF";
        }

        // Build the PDF HTML with all chapters
        const HEADING_RE = /^(CHAPTER|CAPITOLO|CHAPITRE|CAP[IÍ]TULO|KAPITEL)\b/i;
        const now = new Date().toLocaleDateString(lang === "en" ? "en-GB" : "it-IT", { day:"numeric", month:"long", year:"numeric" });

        let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
          <title>PNL – ${escapeHtml(courseTitle)}</title>
          <style>
            body { font-family: Georgia, serif; max-width: 720px; margin: 40px auto; color: #0d1526; line-height: 1.7; padding: 0 24px; }
            h2 { font-size: 20px; margin-top: 40px; color: #002060; }
            h3 { font-size: 16px; margin-top: 24px; font-weight: 700; }
            p { margin: 10px 0; font-size: 15px; }
            .chapter-break { page-break-before: always; margin-top: 48px; }
            .cover { text-align:center; padding: 80px 0 60px; page-break-after: always; }
            .cover .logo { font-size: 64px; font-weight: 900; letter-spacing: -2px; color: #002060; }
            .cover .logo em { color: #D6C29A; font-style: normal; }
            .cover h1 { font-size: 24px; margin-top: 24px; color: #0d1526; }
            .cover .meta { color: #6b738a; font-size: 14px; margin-top: 12px; }
          </style>
        </head><body>
        <div class="cover">
          <div class="logo">P<em>NL</em></div>
          <h1>${escapeHtml(courseTitle)}</h1>
          <p class="meta">${lang === "en" ? "Generated by PNL · " : "Generata da PNL · "}${now}</p>
        </div>`;

        chapterLines.forEach((line, idx) => {
          const num = idx + 1;
          const cached = localStorage.getItem(`eleviai_chapter_${num}_text`) || "";
          const lineMatch = line.trim().match(/^(\d+(?:\.\d+)*)[.) ]+(.+)/);
          const chNum = lineMatch ? lineMatch[1] : String(num);
          const chTitle = lineMatch ? lineMatch[2].trim() : line.trim();

          html += `<div class="${idx === 0 ? "" : "chapter-break"}"><h2>${escapeHtml(chNum + ". " + chTitle)}</h2>`;
          cached.split("\n").map(l => l.trim()).filter(Boolean).forEach((l, i) => {
            if (i === 0 && HEADING_RE.test(l)) return;
            html += l.length <= 70 && !l.endsWith(".") && !l.endsWith(":")
              ? `<h3>${escapeHtml(l)}</h3>`
              : `<p>${escapeHtml(l)}</p>`;
          });
          html += `</div>`;
        });

        html += `</body></html>`;
        const win = window.open("", "_blank");
        win.document.write(html);
        win.document.close();
        win.onload = () => win.print();
      });
    })();
  </script>

  <footer id="contact-footer" class="no-print" style="border-top:1px solid var(--border); margin-top:48px; padding:24px 0; text-align:center;">
    <p style="color:var(--muted); font-size:14px; margin:0;">
      <span class="lang-it">Per assistenza scrivici a:</span>
      <span class="lang-en">For support, contact us at:</span>
      &nbsp;<a href="mailto:PNL.masterclass@gmail.com" style="color:var(--brand); font-weight:600;">PNL.masterclass@gmail.com</a>
    </p>
  </footer>
</body>
</html>
