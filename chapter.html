<!DOCTYPE html>
<html lang="it" data-lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PNL – Capitolo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 40'><text y='36' font-family='serif' font-weight='900' font-size='38' fill='%234d8ed4'>P</text><text x='28' y='36' font-family='serif' font-weight='900' font-size='38' fill='%23c9a94c'>NL</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <script src="lang-switch.js"></script>
  <style>
    /* ---- Layout ---- */
    .chapter-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 28px;
      align-items: start;
      padding: 32px 0 48px;
    }

    /* ---- Sidebar ---- */
    .chapter-sidebar {
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 0;
      scrollbar-width: thin;
    }
    .sidebar-heading {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--brand);
      padding: 0 14px 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .sidebar-chapter {
      display: block;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      border-radius: 0;
      line-height: 1.4;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background .12s;
    }
    .sidebar-chapter:hover { background: var(--input-bg); }
    .sidebar-chapter.active {
      font-weight: 800;
      color: var(--brand);
      background: var(--input-bg);
      border-left: 3px solid var(--brand);
      padding-left: 11px;
    }
    /* Sub-chapter entries (1.1, 2.3, etc.) */
    .sidebar-chapter.sub {
      padding-left: 22px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }
    .sidebar-chapter.sub:hover { background: var(--input-bg); }
    .sidebar-chapter.sub.active {
      font-weight: 700;
      color: var(--brand);
      padding-left: 19px;
    }
    .sidebar-sub {
      padding: 3px 14px 3px 22px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ---- Main content ---- */
    .chapter-main { min-width: 0; }
    .box { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 12px; }
    .chapter-title { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
    .chapter-subtitle { font-size: 17px; font-weight: 700; margin-top: 18px; margin-bottom: 6px; }
    .muted { color: var(--muted); }

    /* ---- Responsive ---- */
    @media (max-width: 720px) {
      .chapter-layout { grid-template-columns: 1fr; }
      .chapter-sidebar {
        position: static;
        max-height: 180px;
        order: -1;
      }
    }

    @media print {
      .no-print { display: none !important; }
      .chapter-layout { display: block; }
      .chapter-sidebar { display: none; }
      .box { border: none !important; padding: 0 !important; }
      body { color: #000 !important; background: #fff !important; }
    }
  </style>
</head>
<body>

  <header class="container header no-print">
    <a class="logo" href="prova.html">
      <span class="logo-p">P</span><span class="logo-nl">NL</span>
    </a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="it" type="button">IT</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>
  </header>

  <div class="container">
    <div class="chapter-layout">

      <!-- Sidebar index -->
      <aside class="chapter-sidebar no-print" id="sidebar"></aside>

      <!-- Main reading area -->
      <div class="chapter-main">
        <h1 id="page-title">
          <span class="lang-it">Capitolo</span>
          <span class="lang-en">Chapter</span>
        </h1>
        <p id="chapter-info" class="muted" style="margin-bottom:14px;"></p>

        <div class="no-print" style="margin-bottom:14px;">
          <button class="btn small" id="pdf">
            <span class="lang-it">Scarica PDF</span>
            <span class="lang-en">Download PDF</span>
          </button>
        </div>

        <div id="chapter-content" class="box"></div>

        <div class="no-print" style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn ghost" id="prev-chapter" style="display:none;">
            <span class="lang-it">← Capitolo precedente</span>
            <span class="lang-en">← Previous</span>
          </button>
          <button class="btn" id="next-chapter" style="display:none;">
            <span class="lang-it">Capitolo successivo →</span>
            <span class="lang-en">Next →</span>
          </button>
          <button class="btn" id="go-quiz">
            <span class="lang-it">Vai al quiz</span>
            <span class="lang-en">Go to quiz</span>
          </button>
          <a href="prova.html" class="btn ghost">
            <span class="lang-it">Nuova Masterclass</span>
            <span class="lang-en">New Masterclass</span>
          </a>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function () {
      const outline   = localStorage.getItem("eleviai_outline")   || "";
      const keywords  = localStorage.getItem("eleviai_keywords")  || "";
      const language  = localStorage.getItem("eleviai_language")  || "Italiano";
      const authToken = sessionStorage.getItem("eleviai_token")   || "";

      let currentChapter = parseInt(localStorage.getItem("eleviai_current_chapter") || "1", 10);

      const pageTitleEl = document.getElementById("page-title");
      const infoEl      = document.getElementById("chapter-info");
      const contentEl   = document.getElementById("chapter-content");
      const sidebarEl   = document.getElementById("sidebar");
      const prevBtn     = document.getElementById("prev-chapter");
      const nextBtn     = document.getElementById("next-chapter");
      const quizBtn     = document.getElementById("go-quiz");
      const pdfBtn      = document.getElementById("pdf");

      function getLang() {
        return document.documentElement.getAttribute("data-lang") || "it";
      }
      function escapeHtml(s) {
        return (s || "")
          .replaceAll("&","&amp;").replaceAll("<","&lt;")
          .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
      }

      if (!outline || !keywords) {
        contentEl.innerHTML =
          `<p><span class="lang-it">Nessuna Masterclass trovata. Genera prima un indice dalla pagina di prova gratuita.</span>` +
          `<span class="lang-en">No Masterclass found. Generate an outline from the free trial page first.</span></p>`;
        return;
      }

      // Match top-level chapters ("1. Title", "2) Title") and sub-chapters ("1.1 Title", "2.3 Title")
      const TOP_CHAPTER_RE = /^\s*\d+[.)]\s/;
      const ALL_CHAPTER_RE = /^\s*(?:\d+[.)]\s|\d+\.\d+[\s.])/;

      const allLines     = outline.split("\n").map(l => l.trimEnd()).filter(l => l.trim());
      const chapterLines = allLines.filter(l => ALL_CHAPTER_RE.test(l));
      const totalChapters = chapterLines.length || 1;

      if (currentChapter < 1) currentChapter = 1;
      if (currentChapter > totalChapters) currentChapter = totalChapters;
      localStorage.setItem("eleviai_current_chapter", String(currentChapter));

      const currentLine = (chapterLines[currentChapter - 1] || "").trim();

      // Parse the chapter number code (e.g. "1.2") and title text from the line
      const lineNumMatch = currentLine.match(/^(\d+(?:\.\d+)*)[.) ]+(.+)/);
      const chNum   = lineNumMatch ? lineNumMatch[1] : String(currentChapter);
      const chTitle = lineNumMatch ? lineNumMatch[2].trim() : currentLine;

      // ---- Page title: "Chapter 1.2 – Historical Context and Movements" ----
      pageTitleEl.innerHTML =
        `<span class="lang-it">Capitolo ${escapeHtml(chNum)} – ${escapeHtml(chTitle)}</span>` +
        `<span class="lang-en">Chapter ${escapeHtml(chNum)} – ${escapeHtml(chTitle)}</span>`;

      infoEl.textContent = `${currentChapter} / ${totalChapters}`;

      // ---- Navigation buttons ----
      if (currentChapter > 1) prevBtn.style.display = "inline-block";
      if (currentChapter < totalChapters) nextBtn.style.display = "inline-block";

      // ---- Build sidebar ----
      function buildSidebar() {
        const isEn = getLang() === "en";
        let html = `<div class="sidebar-heading">${isEn ? "Index" : "Indice"}</div>`;
        let chapterIdx = 0;

        allLines.forEach(line => {
          if (ALL_CHAPTER_RE.test(line)) {
            chapterIdx++;
            const isActive = chapterIdx === currentChapter;
            const isSub = !TOP_CHAPTER_RE.test(line);
            html += `<button class="sidebar-chapter${isSub ? " sub" : ""}${isActive ? " active" : ""}" data-ch="${chapterIdx}">${escapeHtml(line.trim())}</button>`;
          } else {
            html += `<div class="sidebar-sub">${escapeHtml(line.trim())}</div>`;
          }
        });

        sidebarEl.innerHTML = html;

        // Navigate on click
        sidebarEl.querySelectorAll(".sidebar-chapter").forEach(btn => {
          btn.addEventListener("click", () => {
            const ch = parseInt(btn.dataset.ch, 10);
            if (ch !== currentChapter) {
              localStorage.setItem("eleviai_current_chapter", String(ch));
              window.location.reload();
            }
          });
        });

        // Scroll active item into view
        const activeBtn = sidebarEl.querySelector(".sidebar-chapter.active");
        if (activeBtn) activeBtn.scrollIntoView({ block: "center" });
      }
      buildSidebar();

      // ---- Render chapter content ----
      // Match heading words with or without a digit (AI sometimes omits it for sub-chapters)
      const CHAPTER_HEADING_RE = /^(CHAPTER|CAPITOLO|CHAPITRE|CAP[IÍ]TULO|KAPITEL)\b/i;

      function renderChapter(text) {
        const rawLines = text.split("\n").map(l => l.trim()).filter(Boolean);
        let html = "";
        rawLines.forEach((line, idx) => {
          // Skip the first line if it's just the chapter heading word — title is in the page header
          if (idx === 0 && CHAPTER_HEADING_RE.test(line)) return;
          const safe = escapeHtml(line);
          if (line.length <= 70 && !line.endsWith(".") && !line.endsWith(":")) {
            html += `<div class="chapter-subtitle">${safe}</div>`;
            return;
          }
          html += `<p>${safe}</p>`;
        });
        return html || `<p>${getLang() === "en" ? "No content." : "Nessun contenuto."}</p>`;
      }

      contentEl.innerHTML =
        `<p><span class="lang-it">Generazione del capitolo in corso… ⏳</span>` +
        `<span class="lang-en">Generating chapter… ⏳</span></p>`;

      fetch("/api/generateChapter", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + authToken },
        body: JSON.stringify({ keywords, language, outline, chapterNumber: currentChapter, chapterTitle: currentLine })
      })
        .then(r => r.json())
        .then(data => {
          if (!data || !data.chapterContent) {
            contentEl.textContent = getLang() === "en"
              ? "Error: no chapter content received from AI."
              : "Errore: nessun contenuto del capitolo ricevuto dall'AI.";
            return;
          }
          localStorage.setItem(`eleviai_chapter_${currentChapter}_text`, data.chapterContent);
          contentEl.innerHTML = renderChapter(data.chapterContent);
        })
        .catch(err => {
          contentEl.textContent = getLang() === "en"
            ? "Network error while generating the chapter."
            : "Errore di rete durante la generazione del capitolo.";
          console.error("Network error (chapter):", err);
        });

      // ---- Button handlers ----
      prevBtn.addEventListener("click", () => {
        localStorage.setItem("eleviai_current_chapter", String(currentChapter - 1));
        window.location.reload();
      });
      nextBtn.addEventListener("click", () => {
        localStorage.setItem("eleviai_current_chapter", String(currentChapter + 1));
        window.location.reload();
      });
      quizBtn.addEventListener("click", () => {
        window.location.href = "quiz.html";
      });
      pdfBtn.addEventListener("click", () => {
        const orig = document.title;
        document.title = `PNL – Chapter ${currentChapter}`;
        window.print();
        document.title = orig;
      });
    })();
  </script>
</body>
</html>
